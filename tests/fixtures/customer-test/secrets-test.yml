---
# secrets-test.yml
# This playbook contains hardcoded secrets to test SEC:* detection.
# Expected violations: SEC:generic-api-key, SEC:password-in-url, etc.
#
# WARNING: These are FAKE credentials for testing only!

- name: Configure application with secrets
  hosts: app_servers
  become: true
  become_user: root

  vars:
    # VIOLATION: Hardcoded API key
    api_key: "sk-1234567890abcdef1234567890abcdef"

    # VIOLATION: Hardcoded password
    db_password: "SuperSecret123!"

    # VIOLATION: AWS-style key (fake)
    aws_access_key: "AKIAIOSFODNN7EXAMPLE"

  tasks:
    - name: Configure database connection
      ansible.builtin.template:
        src: db.conf.j2
        dest: /etc/app/db.conf
        mode: "0600"
      vars:
        connection_string: "postgres://admin:{{ db_password }}@db.example.com/app"

    - name: Set API key in environment
      ansible.builtin.lineinfile:
        path: /etc/environment
        line: "API_KEY={{ api_key }}"
