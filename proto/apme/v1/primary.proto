syntax = "proto3";

package apme.v1;

import "apme/v1/common.proto";

// Primary is the orchestrator daemon: receives chunked fs, runs engine + validators, returns violations.
service Primary {
  rpc Scan(ScanRequest) returns (ScanResponse);
  // ScanStream sends file batches in multiple messages to avoid gRPC max message size (default 4 MiB).
  rpc ScanStream(stream ScanChunk) returns (ScanResponse);
  rpc Format(FormatRequest) returns (FormatResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

// ScanChunk is one batch of files for ScanStream. Send metadata (scan_id, project_root, options) on the first chunk; then one or more chunks with files; set last=true on the final chunk.
message ScanChunk {
  string scan_id = 1;
  string project_root = 2;
  ScanOptions options = 3;  // only used from first chunk
  repeated File files = 4;
  bool last = 5;
}

message ScanOptions {
  bool include_scandata = 1;
  string ansible_core_version = 2;
  repeated string collection_specs = 3;
}

message ScanRequest {
  string scan_id = 1;
  string project_root = 2;
  repeated File files = 3;
  ScanOptions options = 4;
}

message ScanResponse {
  repeated Violation violations = 1;
  string scan_id = 2;
  bytes hierarchy_payload = 3;  // optional, for debugging
  ScanDiagnostics diagnostics = 4;
}

message ScanDiagnostics {
  double engine_parse_ms = 1;
  double engine_annotate_ms = 2;
  double engine_total_ms = 3;
  int32  files_scanned = 4;
  int32  trees_built = 5;
  int32  total_violations = 6;
  repeated ValidatorDiagnostics validators = 7;
  double fan_out_ms = 8;
  double total_ms = 9;
}

message FormatRequest {
  repeated File files = 1;
}

message FormatResponse {
  repeated FileDiff diffs = 1;
}

message FileDiff {
  string path = 1;
  bytes original = 2;
  bytes formatted = 3;
  string diff = 4;
}
