# APME Full Pipeline - Format check + violation scan + optional auto-fix
#
# Copy this file to .github/workflows/apme.yml in your Ansible repo.
# Runs format check and full scan as separate jobs for clear feedback.
#
# Optional: Enable auto-remediation by uncommenting the remediate job
# (requires write permissions to push commits).
---
name: APME

on:
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
  # Enable manual trigger for full repo scan
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  PY_COLORS: "1"

jobs:
  # Job 1: Quick format check
  format:
    name: Format Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6

      - name: Install APME
        run: uv pip install --system apme-engine

      - name: Check YAML formatting
        run: apme format --check .

  # Job 2: Full violation scan
  check:
    name: Violation Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6

      - name: Install APME
        run: uv pip install --system apme-engine

      - name: Run APME check
        run: apme check .

      # Optional: Save results as artifact
      - name: Save JSON results
        if: always()
        run: apme check . --json > apme-results.json || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apme-results
          path: apme-results.json
          retention-days: 30

  # Job 3: Auto-remediation (optional - uncomment to enable)
