# APME Check - Basic Ansible content scanning
#
# Copy this file to .github/workflows/apme.yml in your Ansible repo.
# Runs on every PR that modifies YAML files.
#
# Exit codes:
#   0 = No violations
#   1 = Violations found
---
name: APME Check

on:
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"

# Cancel in-progress runs on new pushes to same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  PY_COLORS: "1"

jobs:
  apme-check:
    name: APME Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd0fca # v6

      - name: Install APME
        run: uv pip install --system apme-engine

      - name: Run APME check
        run: apme check .
